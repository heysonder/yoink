name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.29.1

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit

  deploy:
    needs: validate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build deploy image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          load: true
          tags: yoink:latest

      - name: Package image
        run: docker save yoink:latest | gzip -1 > yoink-image.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<CFG
          Host vps
            HostName $VPS_HOST
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            ConnectTimeout 30
          CFG
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Upload image to VPS
        run: scp yoink-image.tar.gz vps:/tmp/yoink-image.tar.gz

      - name: Deploy on VPS
        run: |
          ssh vps bash <<'DEPLOY'
          set -euo pipefail
          cd /root/services/yoink
          git pull origin main --quiet
          docker load < /tmp/yoink-image.tar.gz
          rm -f /tmp/yoink-image.tar.gz
          docker compose up -d --no-build --remove-orphans

          echo "waiting for health check..."
          for i in $(seq 1 12); do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null 2>&1; then
              echo "healthy after ${i}x5s"
              exit 0
            fi
            sleep 5
          done
          echo "health check failed after 60s" >&2
          exit 1
          DEPLOY

      - name: Post-deploy health summary
        if: always()
        run: |
          HEALTH=$(ssh vps 'curl -fsS http://127.0.0.1:3000/api/health' 2>/dev/null) || HEALTH=""

          if [ -z "$HEALTH" ]; then
            echo "## Post-deploy health" >> "$GITHUB_STEP_SUMMARY"
            echo "- app: unreachable" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Post-deploy health::Could not reach health endpoint"
            exit 0
          fi

          node -e "
            const health = JSON.parse(process.argv[1]);
            const checks = new Map((health.checks || []).map(c => [c.name, c.ok]));
            const items = [
              ['app', health.status === 'ok'],
              ['spotify', checks.get('spotify') === true],
              ['youtube/piped', checks.get('piped') === true],
              ['tidal', checks.get('tidal') === true],
              ['deezer', checks.get('deezer') === true],
              ['ffmpeg', checks.get('ffmpeg') === true],
            ];
            const failing = items.filter(([, ok]) => !ok).map(([n]) => n);
            const lines = ['## Post-deploy health', ...items.map(([n, ok]) => '- ' + n + ': ' + (ok ? 'ok' : 'degraded'))];
            require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join('\n') + '\n');
            if (failing.length) console.log('::warning title=Post-deploy health degraded::' + failing.join(', '));
          " "$HEALTH"
