name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.29.1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run build
        run: pnpm build

      - name: Run unit tests
        run: pnpm test:unit

  deploy:
    needs: validate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build deploy image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          tags: yoink:latest
          outputs: type=docker,dest=/tmp/yoink-image.tar

      - name: Package image
        run: gzip -1 < /tmp/yoink-image.tar > yoink-image.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<CFG
          Host vps
            HostName $VPS_HOST
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking accept-new
            ConnectTimeout 30
          CFG
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}

      - name: Stream image to VPS
        run: ssh -T vps 'cat > /tmp/yoink-image.tar.gz' < yoink-image.tar.gz

      - name: Deploy on VPS
        id: deploy
        run: |
          if ssh -T vps bash <<'DEPLOY'
          set -euo pipefail
          cd /root/services/yoink
          git pull origin main
          gunzip -c /tmp/yoink-image.tar.gz | docker load
          rm -f /tmp/yoink-image.tar.gz
          docker compose up -d --no-build --force-recreate --remove-orphans

          echo "waiting for health check..."
          for i in $(seq 1 12); do
            if curl -fsS http://127.0.0.1:3000/api/health > /dev/null 2>&1; then
              echo "healthy after ${i}x5s"
              exit 0
            fi
            sleep 5
          done

          echo "health check failed after 60s" >&2
          exit 1
          DEPLOY
          then
            echo "health=ok" >> "$GITHUB_OUTPUT"
          else
            echo "health=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Capture VPS diagnostics
        if: failure()
        run: |
          ssh -T vps bash <<'DIAG'
          set +e
          cd /root/services/yoink || exit 0
          echo "== docker compose ps =="
          docker compose ps
          echo
          echo "== recent yoink logs =="
          docker compose logs --tail=80 yoink
          DIAG

      - name: Post-deploy health summary
        if: always()
        run: |
          echo "## Post-deploy health" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.deploy.outputs.health }}" = "ok" ]; then
            echo "- app: ok" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- app: unreachable" >> "$GITHUB_STEP_SUMMARY"
            echo "::warning title=Post-deploy health::Could not reach health endpoint"
          fi
