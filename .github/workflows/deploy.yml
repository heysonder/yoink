name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy
        run: |
          for attempt in 1 2 3; do
            if ssh \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              root@"$VPS_HOST" '
              cd /root/services/yoink &&
              git pull origin main &&
              docker compose build &&
              docker compose up -d --force-recreate
            '; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "SSH deploy attempt $attempt failed, retrying in 15 seconds..."
              sleep 15
            fi
          done

          echo "SSH deploy failed after 3 attempts"
          exit 1
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
