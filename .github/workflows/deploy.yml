name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build deploy image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: yoink:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Package image
        run: docker save yoink:latest | gzip -1 > yoink-image.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy
        run: |
          for attempt in 1 2 3; do
            if ssh \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              root@"$VPS_HOST" 'cat > /tmp/yoink-image.tar.gz' < yoink-image.tar.gz && \
              ssh \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=30 \
              root@"$VPS_HOST" '
              cd /root/services/yoink &&
              git pull origin main &&
              docker load < /tmp/yoink-image.tar.gz &&
              rm -f /tmp/yoink-image.tar.gz &&
              docker compose up -d --no-build --remove-orphans
            '; then
              exit 0
            fi

            if [ "$attempt" -lt 3 ]; then
              echo "SSH deploy attempt $attempt failed, retrying in 15 seconds..."
              sleep 15
            fi
          done

          echo "SSH deploy failed after 3 attempts"
          exit 1
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
